                <template x-for="item in getBmcTopItems('metrics', 6)" :key="item.rowIndex || JSON.stringify(item)">
                  <button type="button" class="bmc-item-card bmc-item-card-compact" @click="openBmcDetail('metrics', item)">
                    <div class="bmc-item-row">
                      <span class="bmc-item-name" x-text="getBmcItemLabel('metrics', item)"></span>
                      <span class="status-badge small" :class="getBmcStatusClass(getBmcStatus('metrics', item))" x-show="getBmcStatus('metrics', item)" x-text="getBmcStatus('metrics', item)"></span>
                    </div>
                    <p class="bmc-item-preview" x-text="getBmcItemPreview('metrics', item)"></p>
                    <div class="bmc-meta-grid">
                      <template x-for="meta in getBmcMetaLines('metrics', item)" :key="meta.label">
                        <div class="bmc-meta-chip"><span x-text="meta.label"></span><strong x-text="meta.value"></strong></div>
                      </template>
                    </div>
                  </button>
                </template>
                <div class="bmc-empty" x-show="getBmcFilteredItems('metrics').length === 0">No metrics data matches the current filters.</div>
              </div>
            </div>

            <div class="bmc-block bmc-platforms-block">
              <div class="bmc-block-header">
                <div>
                  <span class="bmc-block-title">Platforms</span>
                  <p class="bmc-block-summary" x-text="getBmcSectionSummary('platforms')"></p>
                </div>
                <span class="bmc-block-count" x-text="getBmcBlockItems('platforms').length"></span>
              </div>
              <div class="bmc-block-actions">
                <button class="filter-pill" @click="bmcFocus = 'platforms'">Focus</button>
              </div>
              <div class="bmc-block-items bmc-block-items-rich">
                <template x-for="item in getBmcTopItems('platforms', 6)" :key="item.rowIndex || JSON.stringify(item)">
                  <button type="button" class="bmc-item-card bmc-item-card-compact" @click="openBmcDetail('platforms', item)">
                    <div class="bmc-item-row">
                      <span class="bmc-item-name" x-text="getBmcItemLabel('platforms', item)"></span>
                      <span class="status-badge small" :class="getBmcStatusClass(getBmcStatus('platforms', item))" x-show="getBmcStatus('platforms', item)" x-text="getBmcStatus('platforms', item)"></span>
                    </div>
                    <p class="bmc-item-preview" x-text="getBmcItemPreview('platforms', item)"></p>
                    <div class="bmc-meta-grid">
                      <template x-for="meta in getBmcMetaLines('platforms', item)" :key="meta.label">
                        <div class="bmc-meta-chip"><span x-text="meta.label"></span><strong x-text="meta.value"></strong></div>
                      </template>
                    </div>
                  </button>
                </template>
                <div class="bmc-empty" x-show="getBmcFilteredItems('platforms').length === 0">No platform data matches the current filters.</div>
              </div>
            </div>

          </div>
        </div>
      </template>

      <!-- BMC Item Detail Panel -->
      <div class="detail-panel" x-show="bmcDetailItem" x-cloak>
        <div class="detail-panel-header">
          <div>
            <span class="detail-kicker">Canvas Detail</span>
            <h3 x-text="getBmcDetailTitle()"></h3>
          </div>
          <button class="btn-ghost btn-sm" @click="bmcDetailItem = null; bmcDetailKey = ''" aria-label="Close detail panel">Close</button>
        </div>
        <div class="detail-panel-body">
          <template x-if="bmcDetailItem">
            <div>
              <template x-if="getBmcRelatedItems().length > 0">
                <div class="detail-related">
                  <div class="detail-related-header">
                    <span class="detail-related-title">Linked Records</span>
                    <span class="detail-related-note">Jump across the canvas</span>
                  </div>
                  <div class="detail-related-list">
                    <template x-for="related in getBmcRelatedItems()" :key="related.blockKey + ':' + (related.item.rowIndex || related.name)">
                      <button type="button" class="detail-related-item" @click="openBmcRelatedItem(related)">
                        <span class="detail-related-kicker" x-text="related.section"></span>
                        <span class="detail-related-name" x-text="related.name"></span>
                        <span class="status-badge small detail-related-status" :class="getBmcStatusClass(related.status)" x-show="related.status" x-text="related.status"></span>
                      </button>
                    </template>
                  </div>
                </div>
              </template>
              <template x-for="[key, value] in Object.entries(bmcDetailItem || {}).filter(([k,v]) => k !== 'rowIndex' && v !== null && v !== undefined && v !== '')" :key="key">
                <div class="detail-row">
                  <span class="detail-label" x-text="key.replace(/_/g, ' ')"></span>
                  <span class="detail-value" x-text="typeof value === 'object' ? JSON.stringify(value) : String(value)"></span>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
      <!-- Overlay to close detail panel -->
      <div x-show="bmcDetailItem" @click="bmcDetailItem = null; bmcDetailKey = ''" style="position:fixed;inset:0;z-index:49;" x-cloak></div>
