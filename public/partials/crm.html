                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="(tpl, i) in (crmConfig.messageTemplates || [])" :key="i">
                        <tr>
                          <template x-for="col in Object.keys(tpl)" :key="col">
                            <td x-text="tpl[col]"></td>
                          </template>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </div>
                <div x-show="!crmConfig.messageTemplates || crmConfig.messageTemplates.length === 0" class="empty-state"><p>No templates configured.</p></div>
              </details>
            </div>
          </template>
        </div>
      </template>

      <div class="detail-panel" x-show="crmDetail || crmDetailLoading" x-cloak>
        <div class="detail-panel-header">
          <h3>
            <template x-if="crmDetailLoading">
              <span>Loading...</span>
            </template>
            <template x-if="!crmDetailLoading && crmDetail && crmDetailType === 'lead'">
              <span x-text="crmDetail.lead ? (crmDetail.lead.name || 'Lead Detail') : 'Lead Detail'"></span>
            </template>
            <template x-if="!crmDetailLoading && crmDetail && crmDetailType === 'flow'">
              <span x-text="crmDetail.flow ? (`Flow — ${crmDetail.flow.stage || ''}`) : 'Flow Detail'"></span>
            </template>
          </h3>
          <button class="btn-ghost" @click="closeCrmDetail()" aria-label="Close detail panel">Close</button>
        </div>
        <div class="detail-panel-body">
          <template x-if="!crmDetailLoading && crmDetail && crmDetailType === 'lead'">
            <div>
              <template x-if="crmDetail.lead">
                <div>
                  <h4 class="crm-detail-section-title">Lead Info</h4>
                  <template x-for="[k, v] in Object.entries(crmDetail.lead).filter(([k,v]) => v !== null && v !== undefined && v !== '')" :key="k">
                    <div class="detail-row">
                      <span class="detail-label" x-text="k.replace(/_/g, ' ')"></span>
                      <span class="detail-value" x-text="v"></span>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="crmDetail.flows && crmDetail.flows.length > 0">
                <div style="margin-top: 1.25rem;">
                  <h4 class="crm-detail-section-title">Related Flows (<span x-text="crmDetail.flows.length"></span>)</h4>
                  <template x-for="flow in crmDetail.flows" :key="flow.flow_id">
                    <div class="detail-row crm-detail-flow-row" @click="openCrmFlow(flow.flow_id)" role="button" tabindex="0" @keydown.enter="openCrmFlow(flow.flow_id)" style="cursor:pointer;">
                      <span class="detail-label" x-text="flow.stage || '—'"></span>
                      <span class="detail-value">
                        <span class="badge" :data-status="flow.status" :class="getCrmStatusColor(flow.status)" x-text="flow.status || '—'"></span>
                        <span class="text-muted" style="margin-left: 4px;" x-text="flow.owner || ''"></span>
                      </span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <template x-if="!crmDetailLoading && crmDetail && crmDetailType === 'flow'">
            <div>
              <template x-if="crmDetail.flow">
                <div>
                  <h4 class="crm-detail-section-title">Flow Info</h4>
                  <template x-for="[k, v] in Object.entries(crmDetail.flow).filter(([k,v]) => v !== null && v !== undefined && v !== '')" :key="k">
                    <div class="detail-row">
                      <span class="detail-label" x-text="k.replace(/_/g, ' ')"></span>
                      <span class="detail-value" x-text="v"></span>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="crmDetail.lead">
                <div style="margin-top: 1.25rem;">
                  <h4 class="crm-detail-section-title">Linked Lead</h4>
                  <div class="detail-row crm-detail-flow-row" @click="openCrmLead(crmDetail.lead.lead_id)" role="button" tabindex="0" @keydown.enter="openCrmLead(crmDetail.lead.lead_id)" style="cursor:pointer;">
                    <span class="detail-label" x-text="crmDetail.lead.name || '—'"></span>
                    <span class="detail-value text-muted" x-text="crmDetail.lead.company || ''"></span>
                  </div>
                </div>
              </template>
              <template x-if="crmDetail.suggestedActions && crmDetail.suggestedActions.length > 0">
                <div style="margin-top: 1.25rem;">
                  <h4 class="crm-detail-section-title">Suggested Actions</h4>
                  <template x-for="(action, i) in crmDetail.suggestedActions" :key="i">
                    <div class="detail-row">
                      <span class="detail-value" x-text="action"></span>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>

          <div x-show="crmDetailLoading" class="skeleton-stack">
            <div class="loading-skeleton skeleton-text-line"></div>
            <div class="loading-skeleton skeleton-text-line"></div>
            <div class="loading-skeleton skeleton-text-line"></div>
          </div>
        </div>
      </div>
      <div x-show="crmDetail || crmDetailLoading" @click="closeCrmDetail()" style="position:fixed;inset:0;z-index:49;" x-cloak></div>
