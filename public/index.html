<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YDS Command Centre</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="/css/core.css">
  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
  <script src="https://unpkg.com/lucide@0.475.0"></script>
</head>
<body x-data="app()" x-init="init(); $nextTick(() => lucide && lucide.createIcons && lucide.createIcons())">

  <!-- Skip to main content (keyboard accessibility) -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">YDS <span class="logo-accent">Command Centre</span></h1>
      <a class="header-surface-link" href="/ceo" title="Open CEO Dashboard">CEO Surface</a>
    </div>
    <div class="header-right">
      <button class="cmd-trigger" @click="toggleCmdPalette()" :title="getShortcutTooltip('Command Palette', 'palette')">
        <span class="cmd-trigger-key">&#8984;K</span>
      </button>
      <button class="header-alert-btn" @click="openNotificationSettingsPanel()" title="Notification settings" aria-label="Notification settings">
        <i data-lucide="bell" aria-hidden="true" style="width:16px;height:16px;stroke-width:2"></i>
        <span class="header-alert-dot" x-show="notificationSettings.enabled && notificationPermission === 'granted'" x-cloak></span>
        <span class="header-alert-count" x-show="getUnreadNotificationCount() > 0" x-text="getUnreadNotificationCount()" x-cloak></span>
      </button>
      <span class="status-dot" :class="connected ? 'status-online' : 'status-offline'" aria-hidden="true"></span>
      <span class="status-text" role="status" x-text="connected ? (chatAvailable ? 'App Online' : 'App Online • Chat Offline') : 'Connecting...'"></span>
    </div>
  </header>

  <!-- Global Metrics Bar -->
  <div class="global-metrics" x-show="dashboard" x-cloak>
    <div class="global-metrics-pills">
      <template x-if="getGlobalMetrics()">
        <span>
          <span class="metric-pill" x-text="getGlobalMetrics().openCommitments + ' Open'"></span>
          <span class="metric-pill" :class="getGlobalMetrics().overdueCount > 0 ? 'danger' : ''" x-text="getGlobalMetrics().overdueCount + ' Overdue'"></span>
          <span class="metric-pill" x-show="getGlobalMetrics().activeProjects > 0" x-text="getGlobalMetrics().activeProjects + ' Active Projects'"></span>
          <span class="metric-pill" x-text="getGlobalMetrics().decisionsThisMonth + ' Decisions this month'"></span>
        </span>
      </template>
    </div>
    <div class="global-metrics-right">
      <span class="metric-refresh" x-text="lastRefresh ? 'Updated ' + getLastRefreshLabel() : ''" x-show="lastRefresh"></span>
      <button class="btn btn-small btn-icon metric-refresh-btn" @click="forceRefresh()" :class="dashboardLoading && 'btn-spinning'" title="Force refresh">
        <span class="refresh-icon">&#x21bb;</span>
      </button>
    </div>
  </div>

  <div class="global-context-bar" x-show="dashboard || overview" x-cloak>
    <div class="global-context-left">
      <span class="global-context-label">Context</span>
      <select class="filter-select global-context-select" x-model="globalContext.owner" @change="applyGlobalOwnerFilter()">
        <option value="">Jump to owner</option>
        <template x-for="owner in getGlobalOwnerOptions()" :key="owner">
          <option :value="owner" x-text="owner"></option>
        </template>
      </select>
      <select class="filter-select global-context-select" x-model="globalContext.focusArea" @change="applyGlobalFocusAreaFilter()">
        <option value="">Jump to focus area</option>
        <template x-for="area in getGlobalFocusAreaOptions()" :key="area">
          <option :value="area" x-text="area"></option>
        </template>
      </select>
    </div>
    <div class="global-context-right">
      <button class="filter-pill" :class="globalContext.mode === 'blocked' && 'filter-pill-active'" @click="applyGlobalMode('blocked')">Blocked</button>
      <button class="filter-pill" :class="globalContext.mode === 'waiting' && 'filter-pill-active'" @click="applyGlobalMode('waiting')">Waiting on Dan</button>
      <button class="filter-pill" :class="globalContext.mode === 'today' && 'filter-pill-active'" @click="applyGlobalMode('today')">Today</button>
      <button class="filter-pill" :class="globalContext.mode === 'projects' && 'filter-pill-active'" @click="applyGlobalMode('projects')">Projects</button>
      <button class="btn btn-small" x-show="globalContext.owner || globalContext.focusArea || globalContext.mode" @click="clearGlobalContext()">Clear</button>
    </div>
  </div>

  <!-- Main layout -->
  <div class="layout">

    <!-- Sidebar navigation -->
    <nav class="sidebar" :class="sidebarExpanded && 'sidebar-expanded'">

      <!-- Command group -->
      <div class="nav-group" x-data="{ collapsed: false }">
        <button class="nav-group-header" data-domain="command" @click="collapsed = !collapsed" :title="sidebarExpanded ? '' : 'Command'">
          <span class="nav-group-emoji" aria-hidden="true">🎯</span>
          <span class="nav-group-label" x-show="sidebarExpanded">Command</span>
          <span class="nav-group-badge" x-show="collapsed && getBadgeCount('command') > 0" x-text="getBadgeCount('command')" x-cloak></span>
          <svg class="nav-chevron" :class="!collapsed && 'nav-chevron-open'" x-show="sidebarExpanded" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
        </button>
        <div class="nav-group-items" x-show="!collapsed" x-transition.duration.150ms>
          <button class="nav-btn" :class="view === 'chat' && 'nav-active'" @click="openNavigationTarget('chat')" aria-label="Chat" :aria-current="view === 'chat' ? 'page' : false" :title="getShortcutTooltip('Chat', 'chat')">
            <span class="nav-icon-emoji" aria-hidden="true">💬</span>
            <span class="nav-label" x-show="sidebarExpanded">Chat</span>
          </button>
          <button class="nav-btn" :class="view === 'dashboard' && 'nav-active'" @click="openNavigationTarget('dashboard')" aria-label="Dashboard" :aria-current="view === 'dashboard' ? 'page' : false" :title="getShortcutTooltip('Dashboard', 'dashboard')">
            <span class="nav-icon-emoji" aria-hidden="true">📊</span>
            <span class="nav-label" x-show="sidebarExpanded">Dashboard</span>
            <span class="nav-badge nav-badge-danger" x-show="(dashboard?.overdue?.length || 0) > 0" x-text="dashboard?.overdue?.length || 0" x-cloak></span>
            <span class="nav-health-dot" :class="(dashboard?.overdue?.length || 0) > 0 ? 'dot-danger' : 'dot-success'" x-show="dashboard" x-cloak></span>
          </button>
          <button class="nav-btn" :class="view === 'actionQueue' && 'nav-active'" @click="openNavigationTarget('actionQueue')" aria-label="Action Queue" :aria-current="view === 'actionQueue' ? 'page' : false" :title="getShortcutTooltip('Action Queue', 'queue')">
            <span class="nav-icon-emoji" aria-hidden="true">⚡</span>
            <span class="nav-label" x-show="sidebarExpanded">Action Queue</span>
            <span class="nav-badge" x-show="actionQueue && actionQueue.dansQueueCount > 0" x-text="actionQueue?.dansQueueCount" x-cloak></span>
            <span class="nav-health-dot" :class="(actionQueue?.dansQueueCount || 0) === 0 ? 'dot-success' : 'dot-warning'" x-show="actionQueue" x-cloak></span>
          </button>
          <button class="nav-btn" :class="view === 'dan-colin' && 'nav-active'" @click="openNavigationTarget('dan-colin')" aria-label="Dan and Colin Queue" :aria-current="view === 'dan-colin' ? 'page' : false">
            <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>
            <span class="nav-label" x-show="sidebarExpanded">Dan &harr; Colin</span>
            <span class="nav-badge nav-badge-warn" x-show="danColin && dcWaitingCount() > 0" x-text="dcWaitingCount()" x-cloak></span>
          </button>
        </div>
      </div>

      <!-- Operations group -->
      <div class="nav-group" x-data="{ collapsed: false }">
        <button class="nav-group-header" data-domain="operations" @click="collapsed = !collapsed" :title="sidebarExpanded ? '' : 'Operations'">
          <span class="nav-group-emoji" aria-hidden="true">🔧</span>
          <span class="nav-group-label" x-show="sidebarExpanded">Operations</span>
          <span class="nav-group-badge" x-show="collapsed && getBadgeCount('operations') > 0" x-text="getBadgeCount('operations')" x-cloak></span>
          <svg class="nav-chevron" :class="!collapsed && 'nav-chevron-open'" x-show="sidebarExpanded" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
        </button>
        <div class="nav-group-items" x-show="!collapsed" x-transition.duration.150ms>
          <button class="nav-btn" :class="view === 'projects' && 'nav-active'" @click="openNavigationTarget('projects')" aria-label="Projects" :aria-current="view === 'projects' ? 'page' : false" :title="getShortcutTooltip('Projects', 'projects')">
            <span class="nav-icon-emoji" aria-hidden="true">📁</span>
            <span class="nav-label" x-show="sidebarExpanded">Projects</span>
          </button>
          <button class="nav-btn" :class="view === 'commitments' && 'nav-active'" @click="openNavigationTarget('commitments')" aria-label="Commitments" :aria-current="view === 'commitments' ? 'page' : false">
            <span class="nav-icon-emoji" aria-hidden="true">✅</span>
            <span class="nav-label" x-show="sidebarExpanded">Commitments</span>
          </button>
          <button class="nav-btn" :class="view === 'registry' && 'nav-active'" @click="openNavigationTarget('registry')" aria-label="Registry" :aria-current="view === 'registry' ? 'page' : false" :title="getShortcutTooltip('Registry', 'registry')">
            <span class="nav-icon-emoji" aria-hidden="true">🗂️</span>
            <span class="nav-label" x-show="sidebarExpanded">Registry</span>
          </button>
          <button class="nav-btn" :class="view === 'team' && 'nav-active'" @click="openNavigationTarget('team')" aria-label="Team" :aria-current="view === 'team' ? 'page' : false" :title="getShortcutTooltip('Team', 'team')">
            <span class="nav-icon-emoji" aria-hidden="true">👥</span>
            <span class="nav-label" x-show="sidebarExpanded">Team</span>
            <span class="nav-badge nav-badge-warn" x-show="getOverloadedCount() > 0" x-text="getOverloadedCount()" x-cloak></span>
          </button>
        </div>
      </div>

      <!-- Growth group -->
      <div class="nav-group" x-data="{ collapsed: false }">
        <button class="nav-group-header" data-domain="growth" @click="collapsed = !collapsed" :title="sidebarExpanded ? '' : 'Growth'">
          <span class="nav-group-emoji" aria-hidden="true">📈</span>
          <span class="nav-group-label" x-show="sidebarExpanded">Growth</span>
          <span class="nav-group-badge" x-show="collapsed && getBadgeCount('growth') > 0" x-text="getBadgeCount('growth')" x-cloak></span>
          <svg class="nav-chevron" :class="!collapsed && 'nav-chevron-open'" x-show="sidebarExpanded" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
        </button>
        <div class="nav-group-items" x-show="!collapsed" x-transition.duration.150ms>
          <button class="nav-btn" :class="view === 'marketingOps' && 'nav-active'" @click="openNavigationTarget('marketingOps')" aria-label="Marketing Ops" :aria-current="view === 'marketingOps' ? 'page' : false" :title="getShortcutTooltip('Marketing Ops', 'marketingOps')">
            <span class="nav-icon-emoji" aria-hidden="true">📣</span>
            <span class="nav-label" x-show="sidebarExpanded">Marketing Ops</span>
            <span class="nav-badge" x-show="mktops?.stats?.blockedCampaigns?.length > 0" x-text="mktops?.stats?.blockedCampaigns?.length" x-cloak></span>
            <span class="nav-health-dot" :class="(mktops?.stats?.blockedCampaigns?.length || 0) > 0 ? 'dot-danger' : 'dot-success'" x-show="mktops" x-cloak></span>
          </button>
          <button class="nav-btn" :class="view === 'crm' && 'nav-active'" @click="openNavigationTarget('crm')" aria-label="CRM" :aria-current="view === 'crm' ? 'page' : false" :title="getShortcutTooltip('CRM', 'crm')">
            <span class="nav-icon-emoji" aria-hidden="true">🤝</span>
            <span class="nav-label" x-show="sidebarExpanded">CRM</span>
          </button>
          <button class="nav-btn" :class="view === 'ops' && 'nav-active'" @click="openNavigationTarget('ops')" aria-label="Inventory &amp; Sales" :aria-current="view === 'ops' ? 'page' : false">
            <span class="nav-icon-emoji" aria-hidden="true">📦</span>
            <span class="nav-label" x-show="sidebarExpanded">Inventory</span>
            <span class="nav-health-dot" :class="(ops?.stockHealth?.outOfStock || 0) > 0 ? 'dot-danger' : 'dot-success'" x-show="ops" x-cloak></span>
          </button>
          <button class="nav-btn" :class="view === 'daily-sales' && 'nav-active'" @click="openNavigationTarget('daily-sales')" aria-label="Daily Sales" :aria-current="view === 'daily-sales' ? 'page' : false">
            <svg class="nav-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125z"/>
            </svg>
            <span class="nav-label" x-show="sidebarExpanded">Daily Sales</span>
          </button>
        </div>
      </div>

      <!-- Strategy group -->
      <div class="nav-group" x-data="{ collapsed: false }">
        <button class="nav-group-header" data-domain="strategy" @click="collapsed = !collapsed" :title="sidebarExpanded ? '' : 'Strategy'">
          <span class="nav-group-emoji" aria-hidden="true">🧭</span>
          <span class="nav-group-label" x-show="sidebarExpanded">Strategy</span>
          <span class="nav-group-badge" x-show="collapsed && getBadgeCount('strategy') > 0" x-text="getBadgeCount('strategy')" x-cloak></span>
          <svg class="nav-chevron" :class="!collapsed && 'nav-chevron-open'" x-show="sidebarExpanded" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
        </button>
        <div class="nav-group-items" x-show="!collapsed" x-transition.duration.150ms>
          <button class="nav-btn" :class="view === 'bmc' && 'nav-active'" @click="openNavigationTarget('bmc')" aria-label="Business Model Canvas" :aria-current="view === 'bmc' ? 'page' : false" :title="getShortcutTooltip('Business Model Canvas', 'bmc')">
            <span class="nav-icon-emoji" aria-hidden="true">🧩</span>
            <span class="nav-label" x-show="sidebarExpanded">BMC</span>
          </button>
          <button class="nav-btn" :class="view === 'decisions' && 'nav-active'" @click="openNavigationTarget('decisions')" aria-label="Decisions" :aria-current="view === 'decisions' ? 'page' : false" :title="getShortcutTooltip('Decision Log', 'decisions')">
            <span class="nav-icon-emoji" aria-hidden="true">⚖️</span>
            <span class="nav-label" x-show="sidebarExpanded">Decisions</span>
            <span class="nav-badge" x-show="dashboard && dashboard.recentDecisions && dashboard.recentDecisions.length > 0" x-text="dashboard?.recentDecisions?.length" x-cloak></span>
          </button>
          <button class="nav-btn" :class="view === 'docs' && 'nav-active'" @click="openNavigationTarget('docs')" aria-label="Documents" :aria-current="view === 'docs' ? 'page' : false" :title="getShortcutTooltip('Documents', 'docs')">
            <span class="nav-icon-emoji" aria-hidden="true">📄</span>
            <span class="nav-label" x-show="sidebarExpanded">Documents</span>
          </button>
          <button class="nav-btn" :class="view === 'knowledge' && 'nav-active'" @click="openNavigationTarget('knowledge')" aria-label="Knowledge" :aria-current="view === 'knowledge' ? 'page' : false" :title="getShortcutTooltip('Knowledge Base', 'knowledge')">
            <span class="nav-icon-emoji" aria-hidden="true">📚</span>
            <span class="nav-label" x-show="sidebarExpanded">Knowledge</span>
          </button>
        </div>
      </div>

      <!-- Systems group -->
      <div class="nav-group" x-data="{ collapsed: false }">
        <button class="nav-group-header" data-domain="systems" @click="collapsed = !collapsed" :title="sidebarExpanded ? '' : 'Systems'">
          <span class="nav-group-emoji" aria-hidden="true">💻</span>
          <span class="nav-group-label" x-show="sidebarExpanded">Systems</span>
          <span class="nav-group-badge" x-show="collapsed && getBadgeCount('systems') > 0" x-text="getBadgeCount('systems')" x-cloak></span>
          <svg class="nav-chevron" :class="!collapsed && 'nav-chevron-open'" x-show="sidebarExpanded" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/></svg>
        </button>
        <div class="nav-group-items" x-show="!collapsed" x-transition.duration.150ms>
          <button class="nav-btn" :class="view === 'techTeam' && 'nav-active'" @click="openNavigationTarget('techTeam')" aria-label="Tech Team" :aria-current="view === 'techTeam' ? 'page' : false" :title="getShortcutTooltip('Tech Team', 'techTeam')">
            <span class="nav-icon-emoji" aria-hidden="true">⚙️</span>
            <span class="nav-label" x-show="sidebarExpanded">Tech Team</span>
            <span class="nav-badge" x-show="techTeam?.stats?.blocked > 0" x-text="techTeam?.stats?.blocked" x-cloak></span>
            <span class="nav-health-dot" :class="(techTeam?.stats?.blocked || 0) > 0 ? 'dot-danger' : 'dot-success'" x-show="techTeam" x-cloak></span>
          </button>
          <button class="nav-btn" :class="view === 'factory' && 'nav-active'" @click="openNavigationTarget('factory')" aria-label="Factory" :aria-current="view === 'factory' ? 'page' : false">
            <span class="nav-icon-emoji" aria-hidden="true">🏭</span>
            <span class="nav-label" x-show="sidebarExpanded">Factory</span>
          </button>
          <button class="nav-btn" :class="view === 'notion' && 'nav-active'" @click="openNavigationTarget('notion')" aria-label="Notion browser" :aria-current="view === 'notion' ? 'page' : false" :title="getShortcutTooltip('Notion', 'notion')">
            <span class="nav-icon-emoji" aria-hidden="true">📋</span>
            <span class="nav-label" x-show="sidebarExpanded">Notion</span>
          </button>
          <button class="nav-btn" :class="view === 'overview' && 'nav-active'" @click="openNavigationTarget('overview')" aria-label="Overview" :aria-current="view === 'overview' ? 'page' : false">
            <span class="nav-icon-emoji" aria-hidden="true">🔭</span>
            <span class="nav-label" x-show="sidebarExpanded">Overview</span>
          </button>
          <button class="nav-btn" :class="view === 'claude-usage' && 'nav-active'" @click="openNavigationTarget('claude-usage')" aria-label="Claude Usage" :aria-current="view === 'claude-usage' ? 'page' : false">
            <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
            <span class="nav-label" x-show="sidebarExpanded">Claude Usage</span>
          </button>
          <button class="nav-btn" :class="view === 'status' && 'nav-active'" @click="openNavigationTarget('status')" aria-label="System Status" :aria-current="view === 'status' ? 'page' : false">
            <span class="nav-icon-emoji" aria-hidden="true">🩺</span>
            <span class="nav-label" x-show="sidebarExpanded">System Status</span>
          </button>
          <button class="nav-btn" :class="view === 'system-map' && 'nav-active'" @click="openNavigationTarget('system-map')" aria-label="System Map" :aria-current="view === 'system-map' ? 'page' : false">
            <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd"/></svg>
            <span class="nav-label" x-show="sidebarExpanded">System Map</span>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="nav-spacer"></div>
      <div class="nav-shortcuts-hint" x-show="sidebarExpanded">
        <span class="shortcut-hint" x-text="getShortcutLabel('palette') + ' Palette'"></span>
        <span class="shortcut-hint" x-text="getShortcutLabel('dashboard') + ' Dash'"></span>
        <span class="shortcut-hint" x-text="getShortcutLabel('projects') + ' Proj'"></span>
      </div>
      <button class="nav-btn nav-secondary" @click="clearChat()" aria-label="New chat" :title="getShortcutTooltip('New Commitment', 'newCommitment') + ' • ' + getShortcutTooltip('New Decision', 'newDecision')">
        <svg class="nav-icon-svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/></svg>
        <span class="nav-label" x-show="sidebarExpanded">New</span>
      </button>

  <div class="cmd-overlay" x-show="cmdPaletteOpen" x-transition.opacity @click.self="closeCmdPalette()" x-cloak>
    <div class="cmd-palette" role="dialog" aria-modal="true" aria-label="Command palette">
      <!-- Input row -->
      <div class="cmd-input-wrap">
        <span class="cmd-icon">&#8984;K</span>
        <input
          id="cmd-palette-input"
          type="text"
          class="cmd-input"
          placeholder="Search views, entities, or type > for actions..."
          :value="cmdSearch"
          @input="handleCmdInput($event.target.value)"
          @keydown="cmdKeydown($event)"
          x-ref="cmdInput"
          autocomplete="off"
          spellcheck="false"
        >
        <span class="cmd-palette-spinner" x-show="cmdSearching" x-cloak aria-label="Searching">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" class="cmd-spinner-svg"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="2" stroke-dasharray="26" stroke-dashoffset="10" stroke-linecap="round"/></svg>
        </span>
      </div>

      <!-- Category filter pills -->
      <div class="cmd-palette-categories" x-show="cmdSearch.length > 0" x-cloak>
        <button class="cmd-palette-cat" :class="cmdCategory === 'all' && 'active'" @click="cmdCategory = 'all'">All</button>
        <button class="cmd-palette-cat" :class="cmdCategory === 'views' && 'active'" @click="cmdCategory = 'views'">Views</button>
        <button class="cmd-palette-cat" :class="cmdCategory === 'entities' && 'active'" @click="cmdCategory = 'entities'">Entities</button>
        <button class="cmd-palette-cat" :class="cmdCategory === 'actions' && 'active'" @click="cmdCategory = 'actions'">Actions</button>
      </div>

      <!-- Results list -->
      <div class="cmd-results">
        <template x-if="cmdResults.length === 0 && cmdSearch.length > 0 && !cmdSearching">
          <div class="cmd-empty">No results for "<span x-text="cmdSearch"></span>"</div>
        </template>

        <template x-if="cmdResults.length === 0 && cmdSearch.length === 0 && !cmdSearching">
          <div class="cmd-empty" style="padding-top:1rem;padding-bottom:0.5rem;">Recent commands will appear here. Type to search.</div>
        </template>

        <template x-for="(result, idx) in (cmdCategory === 'all' ? cmdResults : cmdResults.filter(r => cmdCategory === 'actions' ? r.type === 'action' : cmdCategory === 'views' ? r.type === 'view' : (r.type !== 'view' && r.type !== 'action')))" :key="result.label + idx">
          <button
            class="cmd-result-item"
            :class="idx === cmdSelectedIndex && 'cmd-selected'"
            @click="cmdExecuteResult(result)"
            @mouseenter="cmdSelectedIndex = idx"
          >
            <span class="cmd-result-icon" x-text="result.icon || '▸'"></span>
            <span class="cmd-result-label" x-text="result.label"></span>
            <span class="cmd-result-type" x-text="result.type || ''"></span>
            <template x-if="result.status">
              <span
                class="badge"
                :data-status="result.status"
                x-text="result.status"
              ></span>
            </template>
            <span class="cmd-result-hint" x-show="idx === cmdSelectedIndex" x-cloak>Enter</span>
          </button>
        </template>
      </div>

      <!-- Footer hints -->
      <div class="cmd-footer">
        <span class="cmd-footer-hint">&#8593;&#8595; navigate</span>
        <span class="cmd-footer-hint">&#8629; select</span>
        <span class="cmd-footer-hint">esc close</span>
        <span class="cmd-footer-hint">&gt; actions</span>
      </div>
    </div>
  </div>

  <!-- Notification Settings -->

    <div class="modal-card notification-modal" @click.stop>

      </div>

      <div x-show="notificationModalTab === 'center'">
        <div class="notification-status-row">
          <span class="status-badge small" :class="notificationPermission === 'granted' ? 'success' : notificationPermission === 'denied' ? 'danger' : 'warning'" x-text="notificationPermission"></span>
          <span class="notification-helper" x-text="getUnreadNotificationCount() > 0 ? getUnreadNotificationCount() + ' unread alert(s)' : 'No unread alerts right now.'"></span>

        <div class="saved-view-pills" style="margin-bottom: 1rem;">
          <button class="filter-pill" :class="notificationCenterFilter === 'all' && 'filter-pill-active'" @click="notificationCenterFilter = 'all'">All</button>
          <button class="filter-pill" :class="notificationCenterFilter === 'unread' && 'filter-pill-active'" @click="notificationCenterFilter = 'unread'">Unread</button>
          <button class="filter-pill" :class="notificationCenterFilter === 'snoozed' && 'filter-pill-active'" @click="notificationCenterFilter = 'snoozed'">Snoozed</button>
        </div>

        <div class="notification-center-list" x-show="getFilteredNotificationCenterItems().length > 0">
          <template x-for="item in getFilteredNotificationCenterItems()" :key="item.id">
            <div class="notification-center-item" :class="!item.read && 'notification-center-item--unread'">
              <div class="notification-center-head">
                <span class="status-badge small" :class="item.type === 'digest' ? 'info' : item.type === 'test' ? 'neutral' : 'warning'" x-text="getNotificationRuleLabel(item.rule)"></span>
                <span class="notification-center-time" x-text="formatRelativeTime(item.createdAt)"></span>
              </div>
              <div class="notification-center-title" x-text="item.title"></div>
              <div class="notification-center-body" x-text="item.body"></div>
              <div class="table-inline-actions" style="margin-top:0.75rem">
                <button type="button" class="mini-action-btn" @click="openNotificationCenterItem(item)">Open</button>
                <button type="button" class="mini-action-btn" @click="markNotificationRead(item.id)">Read</button>
                <button type="button" class="mini-action-btn" @click="snoozeNotification(item.id, 60)">Snooze 1h</button>
                <button type="button" class="mini-action-btn" @click="dismissNotification(item.id)">Dismiss</button>
              </div>
            </div>
          </template>

        <div>
          <template x-if="drawerType === 'output'">
            <div>
              <div class="detail-drawer-section">
                <div class="detail-drawer-field">
                  <span class="detail-drawer-field-label">Category</span>
                  <span class="detail-drawer-field-value" x-text="drawerData.category || 'output'"></span>
                </div>
                <div class="detail-drawer-field">
                  <span class="detail-drawer-field-label">Path</span>
                  <span class="detail-drawer-field-value detail-drawer-mono" x-text="drawerData.path || '—'"></span>
                </div>
                <div class="detail-drawer-field">
                  <span class="detail-drawer-field-label">Review Status</span>
                  <span class="detail-drawer-field-value" x-text="drawerData.status || 'pending'"></span>
                </div>
                <div class="detail-drawer-field" x-show="drawerData.reviewedAt">
                  <span class="detail-drawer-field-label">Reviewed</span>
                  <span class="detail-drawer-field-value" x-text="new Date(drawerData.reviewedAt).toLocaleString()"></span>
                </div>
                <div class="detail-drawer-field" x-show="drawerData.reviewerNote">
                  <span class="detail-drawer-field-label">Reviewer Note</span>
                  <span class="detail-drawer-field-value" x-text="drawerData.reviewerNote"></span>
                </div>
              </div>

              <div class="detail-drawer-section">
                <h3 class="detail-drawer-section-heading">Actions</h3>
                <div class="doc-card-actions">
                  <button class="btn-primary btn-sm" @click="reviewDrawerOutput('approved')">Approve</button>
                  <button class="btn-ghost btn-sm" @click="reviewDrawerOutput('needs-edit')">Needs Edit</button>
                  <button class="btn-ghost btn-sm" @click="reviewDrawerOutput('rejected')">Reject</button>
                  <button class="btn-ghost btn-sm" @click="openDocument(drawerData.category, drawerData.filename); closeDrawer();">Open Full View</button>
                </div>
              </div>

              <template x-if="drawerData.relatedContext && ((drawerData.relatedContext.owners || []).length || (drawerData.relatedContext.focusAreas || []).length || (drawerData.relatedContext.projects || []).length || (drawerData.relatedContext.decisions || []).length || (drawerData.relatedContext.views || []).length)">
                <div class="detail-drawer-section">
                  <h3 class="detail-drawer-section-heading">Linked Context</h3>
                  <div class="doc-context-block" x-show="(drawerData.relatedContext?.owners || []).length">
                    <div class="detail-drawer-field-label">Owners</div>
                    <div class="table-inline-actions">
                      <template x-for="owner in (drawerData.relatedContext?.owners || [])" :key="'drawer-owner-' + owner.name">
                        <button type="button" class="mini-action-btn" @click="openDocumentContextLink({ type: 'owner', name: owner.name }); closeDrawer();" x-text="owner.name"></button>
                      </template>
                    </div>
                  </div>
                  <div class="doc-context-block" x-show="(drawerData.relatedContext?.focusAreas || []).length">
                    <div class="detail-drawer-field-label">Focus Areas</div>
                    <div class="table-inline-actions">
                      <template x-for="area in (drawerData.relatedContext?.focusAreas || [])" :key="'drawer-area-' + area.name">
                        <button type="button" class="mini-action-btn" @click="openDocumentContextLink({ type: 'focus-area', name: area.name }); closeDrawer();" x-text="area.name"></button>
                      </template>
                    </div>
                  </div>
                  <div class="doc-context-block" x-show="(drawerData.relatedContext?.projects || []).length">
                    <div class="detail-drawer-field-label">Projects</div>
                    <div class="table-inline-actions">
                      <template x-for="project in (drawerData.relatedContext?.projects || [])" :key="'drawer-project-' + project.name">
                        <button type="button" class="mini-action-btn" @click="openDocumentContextLink({ type: 'project', name: project.name }); closeDrawer();" x-text="project.name"></button>
                      </template>
                    </div>
                  </div>
                  <div class="doc-context-block" x-show="(drawerData.relatedContext?.decisions || []).length">
                    <div class="detail-drawer-field-label">Decisions</div>
                    <div class="table-inline-actions">
                      <template x-for="decision in (drawerData.relatedContext?.decisions || [])" :key="'drawer-decision-' + decision.title">
                        <button type="button" class="mini-action-btn" @click="openDocumentContextLink({ type: 'decision', title: decision.title }); closeDrawer();" x-text="decision.title"></button>
                      </template>
                    </div>
                  </div>
                  <div class="doc-context-block" x-show="(drawerData.relatedContext?.views || []).length">
                    <div class="detail-drawer-field-label">Areas</div>
                    <div class="table-inline-actions">
                      <template x-for="viewLink in (drawerData.relatedContext?.views || [])" :key="'drawer-view-' + viewLink.id">
                        <button type="button" class="mini-action-btn" @click="openDocumentContextLink({ type: 'view', id: viewLink.id }); closeDrawer();" x-text="viewLink.label"></button>
                      </template>
                    </div>
                  </div>
                </div>
              </template>

              <template x-if="(drawerData.history || []).length > 0">
                <div class="detail-drawer-section">
                  <h3 class="detail-drawer-section-heading">History</h3>
                  <template x-for="(entry, idx) in (drawerData.history || [])" :key="idx">
                    <div class="detail-drawer-field">
                      <span class="detail-drawer-field-label" x-text="entry.status"></span>
                      <span class="detail-drawer-field-value" x-text="new Date(entry.reviewedAt).toLocaleString()"></span>
                    </div>
                  </template>
                </div>
              </template>

              <template x-if="drawerData.content">
                <div class="detail-content doc-content" x-html="renderMarkdown(drawerData.content)"></div>
              </template>
            </div>
          </template>

          <template x-if="drawerType !== 'output'">
          <!-- Properties section -->
            <div>
              <div class="detail-drawer-section">
                <template x-for="[key, prop] in Object.entries(drawerData.properties || {})" :key="key">
                  <div class="detail-drawer-field" x-show="getDrawerProp(key) !== null && getDrawerProp(key) !== ''">
                    <span class="detail-drawer-field-label" x-text="key"></span>
                    <span class="detail-drawer-field-value" x-text="typeof getDrawerProp(key) === 'object' ? JSON.stringify(getDrawerProp(key)) : getDrawerProp(key)"></span>
                  </div>
                </template>
              </div>

              <!-- Related items -->
              <template x-if="drawerRelated.length > 0">
                <div class="detail-drawer-section" style="margin-top: 16px;">
                  <h3 class="detail-drawer-section-heading">Related</h3>
                  <template x-for="rel in drawerRelated" :key="rel.id">
                    <button class="detail-drawer-field detail-drawer-field--link" @click="openDrawer(rel.type || 'page', rel.id, rel.title)">
                      <span class="detail-drawer-field-label" x-text="rel.database || 'Related'"></span>
                      <span class="detail-drawer-field-value" x-text="rel.title"></span>
                    </button>
                  </template>
                </div>
              </template>
            </div>
          </template>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" :class="contextMenu.open && 'open'" :style="`left: ${contextMenu.x}px; top: ${contextMenu.y}px`" x-cloak>
    <template x-for="(action, idx) in contextMenu.items" :key="idx">
      <div>
        <div x-show="action.divider" class="context-menu-divider"></div>
        <button x-show="!action.divider" class="context-menu-item" :class="action.danger && 'danger'" @click="executeContextAction(action)">
          <span class="context-menu-icon" x-text="action.icon" aria-hidden="true"></span>
          <span x-text="action.label"></span>
        </button>
      </div>
    </template>
  </div>

  <script type="module" src="/js/app.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
</body>
</html>
