## View 2: Person Load

**Source:** Commitments database
**Purpose:** See who's carrying what. Spot overload before it becomes a blocker.

### Data Query
```
Database: Commitments (71914093-29c0-492f-bab3-5e493a5c7173)
Filter: Status NOT IN ["Done", "Cancelled"]
Group by: Assigned To
```

### Layout
Horizontal cards, one per person. Only show people with active commitments.

**Each person card:**

```
┌─────────────────────────┐
│  [Name]                 │
│  ━━━━━━━━━━━━━━━━━━━━━  │
│  Active: 5              │
│  Overdue: 2 (red)       │
│  Blocked: 1 (orange)    │
│  ─────────────────────  │
│  [commitment list]      │
│  · Task name (Due Mon)  │
│  · Task name (Overdue)  │
│  · Task name (Blocked)  │
└─────────────────────────┘
```

**Card header color:**
- Green: 0 overdue, 0 blocked
- Amber: 1+ overdue OR blocked
- Red: 3+ overdue OR 2+ blocked (overload signal)

**Sort cards by:** Most overdue items first (problems surface left).

### Key Metrics (top bar)
| Metric | Calculation |
|---|---|
| Total open commitments | Count where Status ≠ Done/Cancelled |
| Total overdue | Count where Due Date < today |
| Most loaded person | Person with highest open count |
| Unassigned | Count where Assigned To is empty |

### People to Include
Only real humans (from notion-hub.md People IDs):
- Dan, Arun, Ashwini, Muskan, Chandan, Nirmal, Bimal, Surath, Janak, Diwakar, Gowri
- EXCLUDE any AI expert panel entries

