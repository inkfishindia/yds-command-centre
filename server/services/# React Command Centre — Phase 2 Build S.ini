## View 1: Overdue & Due This Week

**Source:** Commitments database
**Purpose:** Surface what needs attention today. Dan's first screen every morning.

### Data Query
```
Database: Commitments (71914093-29c0-492f-bab3-5e493a5c7173)
Filter: Status NOT IN ["Done", "Cancelled"]
Sort: Due Date ascending (nulls last)
```

### Layout
Two sections, stacked vertically:

**Section A — Overdue (red header)**
- Filter: Due Date < today AND Status ≠ Done/Cancelled
- Show as list/table rows
- Sorted oldest-first (most overdue at top)

**Section B — Due This Week (amber header)**
- Filter: Due Date between today and end-of-week (Sunday)
- Sorted by date ascending

**Each row shows:**

| Field | Source Property | Display |
|---|---|---|
| Task name | Name (title) | Bold, primary text |
| Assigned to | Assigned To (relation → People) | Person name, avatar if available |
| Due date | Due Date | Relative format: "2 days overdue" / "Due tomorrow" / "Due Fri" |
| Priority | Priority (select) | Color dot: Urgent=red, High=orange, Medium=yellow, Low=grey |
| Project | Project (relation → Projects) | Small text label |
| Status | Status (select) | Pill/badge: Not Started=grey, In Progress=blue, Blocked=red |

### Interactions
- Click row → expand detail panel (show Notes, Focus Area, Type)
- Filter toggles: By person, by priority, by focus area
- "Show completed this week" toggle (adds Done items from current week, struck through)

### Empty State
"All clear — nothing overdue, nothing due this week." (This should feel like a win.)

