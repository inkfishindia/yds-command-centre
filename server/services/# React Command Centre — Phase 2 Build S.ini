# React Command Centre — Phase 2 Build Spec

**For:** Nirmal (Tech)
**From:** Dan via Colin
**Date:** 2026-03-04
**Context:** Phase 1 (React frontend → Node.js cache → Notion API) is live. This spec covers the 5 operational views to build next.

---

## Architecture Notes

- All data comes from the existing Notion cache layer (Phase 1)
- No new data sources needed — all 7 databases already cached
- **Relation resolution:** Ensure cache denormalizes relation fields (page IDs → display names) during refresh, not at render time. This applies to: Assigned To, Owner, Focus Area, Project, Audiences.
- **Refresh:** Keep existing 5-min cache cycle. No view needs real-time data.
- **Filtering:** All filters should be client-side on cached data. No additional API calls per filter change.

---

## Build Order

| Priority | View | Daily Value |
|---|---|---|
| 1 | Overdue & Due This Week | Highest — Dan's morning check |
