## View 5: Decision Timeline

**Source:** Decisions database
**Purpose:** Institutional memory. What was decided, when, and why.

### Data Query
```
Database: Decisions (158108d0-623d-4dda-8e5c-2f6ade2597be)
Sort: Date descending (newest first)
```

### Layout
Vertical timeline — each decision as a card on a date-anchored timeline.

**Each decision card:**

```
● 2026-03-02
┌─────────────────────────────────────┐
│  [Decision Title]                   │
│  Owner: Dan                         │
│  Focus Area: [tag]                  │
│  ───────────────────────────────── │
│  Context: [truncated to 2 lines]   │
│  Decision: [truncated to 2 lines]  │
│  ▼ Expand for full detail           │
└─────────────────────────────────────┘
```

**Expanded view shows:**
- Context (full)
- Decision (full)
- Rationale (full)
- Alternatives Considered (full)
- Risks Accepted (full)

### Filters
- By Focus Area
- By Owner
- Date range picker (default: last 90 days)
- Search by keyword (searches Name, Context, Decision fields)

### Visual
- Group by month (March 2026, February 2026, etc.)
- Show count per month: "March 2026 — 4 decisions"

