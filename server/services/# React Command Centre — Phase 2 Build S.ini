## View 3: Focus Area Health

**Source:** Focus Areas + Commitments + Projects databases
**Purpose:** Strategic pulse across all 7 focus areas. Are we progressing or stalling?

### Data Required
For each Focus Area, aggregate:
1. **From Commitments:** Count open, count overdue, count blocked, count completed (last 30 days)
2. **From Projects:** Count active projects linked to this focus area

### Layout
7 cards in a grid (responsive — 3 columns on desktop, 1 on mobile).

**Each focus area card:**

```
┌──────────────────────────────┐
│  [Focus Area Name]     [dot] │
│  ━━━━━━━━━━━━━━━━━━━━━━━━━━  │
│  Projects: 3 active          │
│  ─────────────────────────── │
│  Open tasks:     8           │
│  Overdue:        2           │
│  Blocked:        1           │
│  Done (30d):     5           │
│  ─────────────────────────── │
│  Last activity:  2 days ago  │
│  ─────────────────────────── │
│  [Top 3 overdue items]      │
└──────────────────────────────┘
```

**Health dot color logic:**
| Color | Condition |
|---|---|
| Green | 0 overdue, 0 blocked, activity within 7 days |
| Amber | 1-2 overdue OR 1 blocked OR no activity 7-14 days |
| Red | 3+ overdue OR 2+ blocked OR no activity 14+ days |
| Grey | No open commitments (dormant/paused) |

**"Last activity"** = most recent status change or creation date on any linked commitment.

### Sort
Red → Amber → Green → Grey (problems first).

