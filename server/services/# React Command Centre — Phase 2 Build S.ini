## View 4: Project Board

**Source:** Projects database + linked Commitments
**Purpose:** Track active initiatives — what's moving, what's stuck.

### Data Query
```
Database: Projects (1ae0f102-2c16-401f-b2a4-1eee6b993ab1)
Filter: Status = "Active"
Sort: Name ascending
```

### Layout
Kanban-style columns OR list view (toggle). Default to list.

**List view — each row:**

| Field | Source | Display |
|---|---|---|
| Project name | Name (title) | Bold, primary |
| Owner | Owner (relation → People) | Person name |
| Focus Area | Focus Area (relation) | Label/tag |
| Type | Type (select) | Small badge |
| Commitment summary | Aggregated from Commitments | "3 open / 1 overdue / 5 done" |
| Progress bar | Calculated | Done / (Done + Open) as % bar |

**Kanban view — columns:**
- Active (default)
- On Hold
- Done (last 30 days only)

**Expand a project → show:**
- All linked commitments (grouped by status)
- Linked AI Expert Panel members
- Linked Audiences

### Filters
- By Focus Area
- By Owner
- By Type (Mission Brief / Initiative / Experiment)

### Exclude
- Records where Name contains "TEMPLATE" or "template"
- Records where Status is null (template artifacts)

