## Notes for Nirmal

1. **Relation denormalization is critical.** If not already done in Phase 1, add a step in the cache refresh that resolves all relation page IDs to their display names. Every view depends on showing "Dan" not "307247aa0d7b81318999e80042f45d6a".

2. **Template filtering.** The Projects database has template records with null Status. Filter these out at the cache level: exclude any record where Status is null or Name contains "TEMPLATE".

3. **Date calculations are all client-side.** "Overdue" = Due Date < today. "Due this week" = Due Date between today and Sunday. No server logic needed.

4. **Empty states matter.** Each view should have a clear empty state message — not a blank screen.

5. **No write operations.** This dashboard is read-only. All writes go through Notion directly or through the Claude agent layer.

6. **Duplicate detection.** There are ~3 duplicate AI entries in People DB and 1 duplicate Decision. Either filter by the whitelist of human IDs above, or add a dedup step in cache refresh.
