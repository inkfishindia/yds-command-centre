## Global UI Elements

### Navigation
Sidebar or top tabs with the 5 views:
1. Today (Overdue & Due)
2. People
3. Focus Areas
4. Projects
5. Decisions

**Default landing page:** "Today" view.

### Header Bar (persistent)
Show on every view:

| Metric | Source |
|---|---|
| Open commitments | Commitments: Status ≠ Done/Cancelled |
| Overdue | Commitments: Due Date < today, Status ≠ Done/Cancelled |
| Active projects | Projects: Status = Active |
| Decisions this month | Decisions: Date in current month |
| Last cache refresh | Timestamp from cache layer |

### Refresh
- "Refresh" button forces cache invalidation + re-fetch
- Show "Last updated: X min ago" timestamp
- Auto-refresh every 5 min (match cache cycle)

### Responsive
- Desktop: full layout as described
- Tablet: stack columns, maintain all data
- Mobile: simplified cards, fewer columns, expandable detail

