        --color-tag-blue-text: #BFDBFE;

        --color-note-yellow-text: #FDE68A;
        --color-note-olive-bg: #1c320d;
        --color-note-olive-text: #A3E635;
        --color-note-green-bg: #064E3B;
        --color-note-green-text: #6EE7B7;
        --color-note-purple-bg: #2f175b;
        --color-note-purple-text: #C4B5FD;
        --color-note-orange-bg: #4a1f05;
        --color-note-orange-text: #FDBA74;
        --color-note-pink-bg: #5c082a;
        --color-note-pink-text: #F9A8D4;
        --color-note-teal-bg: #0a3a36;
        --color-note-teal-text: #5EEAD4;
      }

      body {
        background-color: var(--color-bg-canvas);
        color: var(--color-text-primary);
        transition: background-color 0.3s ease, color 0.3s ease;
      }
